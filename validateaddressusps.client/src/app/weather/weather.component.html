<h1 id="tableLabel">Weather forecast</h1>

<p>This component demonstrates fetching data from the server.</p>

<p *ngIf="!(forecasts && forecasts.length > 0)"><em>Loading... Please refresh once the ASP.NET backend has started.</em></p>

<table *ngIf="forecasts && forecasts.length > 0">
  <thead>
    <tr>
      <th>Date</th>
      <th>Temp. (C)</th>
      <th>Temp. (F)</th>
      <th>Summary</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let forecast of forecasts">
      <td>{{ forecast.date }}</td>
      <td>{{ forecast.temperatureC }}</td>
      <td>{{ forecast.temperatureF }}</td>
      <td>{{ forecast.summary }}</td>
    </tr>
  </tbody>
</table>

<!-- Debug: compact raw JSON (compact and left-aligned) -->
<pre class="debug-json" *ngIf="forecasts">{{ compactJson }}</pre>
